<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You - Novasmile</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#f6f4ef;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .card{background:#fff;border-radius:24px;padding:60px 40px;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,0.08)}
    .icon{font-size:56px;margin-bottom:24px}
    h1{font-size:28px;font-weight:800;color:#0C0C0C;margin-bottom:14px}
    p{color:rgba(12,12,12,0.65);font-size:15px;line-height:1.6;margin-bottom:28px}
    a{display:inline-block;background:#0097B5;color:#fff;font-weight:700;padding:14px 28px;border-radius:999px;text-decoration:none;font-size:15px}
    a:hover{background:#007a93}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🦷</div>
    <h1>Request Received!</h1>
    <p>Thank you for booking with Novasmile Dental Studios. Our team will call you within 24 hours to confirm your appointment slot.</p>
    <a href="index.html">Back to Homepage</a>
  </div>
</body>
</html>
