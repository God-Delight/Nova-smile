<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="Favicon.png" />
  <link rel="apple-touch-icon" href="Favicon.png" />
  <title>Novasmile Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #f3f7f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img { height: 40px; }
    .login-logo p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 8px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 900;
      color: #0d2b33;
      margin-bottom: 6px;
      text-align: center;
    }
    .sub {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      margin-bottom: 32px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #dde8ea;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #0097B5; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #0097B5;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #007a93; }
    .btn-login:disabled { background: #aaa; cursor: not-allowed; }
    .error {
      background: #fff0f0;
      color: #c0392b;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
  </style>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-17385956451"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'AW-17385956451');
</script>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <img src="logo-trim.png" alt="Novasmile" onerror="this.style.display='none'" />
      <p>Blog Admin Panel</p>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to manage your blog posts</p>
    <div class="error" id="errorMsg"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@novasmile.com" />
    </div>
  <div class="field" style="position:relative">
    <label>Password</label>
   <input type="password" id="password" placeholder="••••••••" style="padding-right:48px" />
   <button type="button" onclick="togglePassword()" style="position:absolute;right:14px;bottom:13px;background:none;border:none;cursor:pointer;color:#888;font-size:13px;font-weight:700">SHOW</button>
</div>
    <p style="text-align:right;margin-bottom:12px;font-size:0.82rem">
      <a href="#" onclick="handleForgotPassword()" style="color:#0097B5;font-weight:700;text-decoration:none">Forgot password?</a>
  </p>
  <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>
</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = {
  apiKey: "AIzaSyAEa9BtvYs2RjSvRrZZLb2Pz3P-9Xfo5jI",
  authDomain: "nova-smile-404b5.firebaseapp.com",
  projectId: "nova-smile-404b5",
  storageBucket: "nova-smile-404b5.firebasestorage.app",
  messagingSenderId: "205119413201",
  appId: "1:205119413201:web:3e7027c9bf16978206def0"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'admin-dashboard.html';
    });

    window.handleLogin = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      if (!email || !password) {
        errorMsg.textContent = 'Please enter your email and password.';
        errorMsg.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorMsg.classList.remove('show');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'admin-dashboard.html';
      } catch (err) {
        let msg = 'Invalid email or password. Please try again.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with that email.';
        else if (err.code === 'auth/wrong-password') msg = 'Incorrect password. Please try again.';
        else if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Please wait a bit and try again.';
        else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection.';
        else if (err.code) msg = 'Login error: ' + err.code;
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
        errorMsg.style.background = '#fff0f0';
        errorMsg.style.color = '#c0392b';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.handleLogin();
    });

    window.togglePassword = function() {
  const input = document.getElementById('password');
  const btn = event.currentTarget;
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'HIDE';
  } else {
    input.type = 'password';
    btn.textContent = 'SHOW';
  }
}
window.handleForgotPassword = async function() {
  const email = document.getElementById('email').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  if (!email) {
    errorMsg.textContent = 'Please enter your email address first, then click Forgot Password.';
    errorMsg.classList.add('show');
    errorMsg.style.background = '#fff8f0';
    errorMsg.style.color = '#b45309';
    return;
  }

  try {
    await sendPasswordResetEmail(auth, email);
    errorMsg.textContent = 'Reset link sent! Check your inbox. Right-click the link and copy it, then paste into your browser to avoid scanner issues.';
    errorMsg.classList.add('show');
    errorMsg.style.background = '#f0fff4';
    errorMsg.style.color = '#166534';
  } catch (err) {
    errorMsg.textContent = 'Could not send reset email. Check that the email address is correct.';
    errorMsg.classList.add('show');
    errorMsg.style.background = '#fff0f0';
    errorMsg.style.color = '#c0392b';
  }
}
  </script>
</body>
</html>
