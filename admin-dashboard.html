<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="Favicon.png" />
  <link rel="apple-touch-icon" href="Favicon.png" />
  <title>Novasmile Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body { font-family: 'Nunito', sans-serif; background: #f3f7f9; color: #333; }

    /* TOPBAR */
    .topbar {
      background: #fff;
      padding: 0 32px;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex-shrink: 0; }
    .topbar-left img { height: 32px; }
    .topbar-left span { font-size: 0.8rem; color: #888; font-weight: 600; white-space: nowrap; }
    .topbar-right { display: flex; align-items: center; gap: 16px; min-width: 0; }
    .topbar-user {
      font-size: 0.85rem;
      font-weight: 700;
      color: #333;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-logout {
      background: none;
      border: 1.5px solid #dde8ea;
      border-radius: 8px;
      padding: 7px 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: #666;
      cursor: pointer;
    }
    .btn-logout:hover { border-color: #0097B5; color: #0097B5; }

    /* MAIN */
    .main { padding: 32px; max-width: 1100px; margin: 0 auto; }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .page-header h1 { font-size: 1.4rem; font-weight: 900; color: #0d2b33; }
    .page-header p { font-size: 0.85rem; color: #888; margin-top: 2px; }

    .btn-new {
      background: #0097B5;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.88rem;
      padding: 11px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-new:hover { background: #007a93; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-bottom: 20px; }
    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      border: 1.5px solid #e8f0f2;
      min-width: 0;
    }
    .stat-card .label { font-size: 0.78rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-card .num { font-size: 1.8rem; font-weight: 900; color: #0097B5; }

    /* CATEGORY BREAKDOWN */
    .cat-breakdown {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      border: 1.5px solid #e8f0f2;
      margin-bottom: 28px;
    }
    .cat-breakdown h3 { font-size: 0.9rem; font-weight: 800; color: #0d2b33; margin-bottom: 16px; }
    .cat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .cat-row:last-child { margin-bottom: 0; }
    .cat-row .cat-name { font-size: 0.82rem; font-weight: 700; color: #333; width: 110px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cat-row .cat-bar-track { flex: 1; background: #f0f5f7; border-radius: 50px; height: 10px; overflow: hidden; }
    .cat-row .cat-bar-fill { height: 100%; background: linear-gradient(90deg, #0097B5, #FFAD66); border-radius: 50px; transition: width 0.4s ease; }
    .cat-row .cat-count { font-size: 0.8rem; font-weight: 800; color: #0097B5; width: 34px; text-align: right; flex-shrink: 0; }
    .cat-breakdown-empty { font-size: 0.85rem; color: #888; }

    /* TOOLBAR (search + status filter) */
    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border: 1.5px solid #dde8ea;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      color: #333;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #0097B5; }

    /* POSTS TABLE */
    .posts-wrap {
      background: #fff;
      border-radius: 16px;
      border: 1.5px solid #e8f0f2;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .posts-wrap table { width: 100%; min-width: 720px; border-collapse: collapse; }
    .posts-wrap th {
      text-align: left;
      padding: 14px 20px;
      font-size: 0.78rem;
      font-weight: 800;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #f8fbfc;
      border-bottom: 1.5px solid #e8f0f2;
    }
    .posts-wrap td {
      padding: 16px 20px;
      font-size: 0.88rem;
      border-bottom: 1px solid #f0f5f7;
      vertical-align: middle;
    }
    .posts-wrap tr:last-child td { border-bottom: none; }
    .posts-wrap tr:hover td { background: #f8fbfc; }
    .post-title { font-weight: 700; color: #0d2b33; max-width: 300px; }
    .post-cat {
      background: #e6f6fa;
      color: #0097B5;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      display: inline-block;
    }
    .post-date { color: #888; font-size: 0.82rem; }
    .post-views { color: #555; font-size: 0.85rem; font-weight: 700; }
    .th-sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    .th-sortable:hover { color: #0097B5; }
    .btn-edit {
      background: none;
      border: 1.5px solid #dde8ea;
      border-radius: 7px;
      padding: 5px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: #555;
      cursor: pointer;
      margin-right: 6px;
    }
    .btn-edit:hover { border-color: #0097B5; color: #0097B5; }
    .btn-delete {
      background: none;
      border: 1.5px solid #fde8e8;
      border-radius: 7px;
      padding: 5px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: #e74c3c;
      cursor: pointer;
    }
    .btn-delete:hover { background: #fff0f0; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-state p { font-size: 0.9rem; margin-top: 8px; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 36px 40px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .modal-header h2 { font-size: 1.2rem; font-weight: 900; color: #0d2b33; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #888;
      cursor: pointer;
      line-height: 1;
    }
    .form-field { margin-bottom: 18px; }
    .form-field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 6px;
    }
    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #dde8ea;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus { border-color: #0097B5; }
    .form-field textarea { min-height: 180px; resize: vertical; line-height: 1.65; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; flex-wrap: wrap; }
    .modal-actions button { flex-shrink: 0; }
    .btn-cancel {
      background: none;
      border: 1.5px solid #dde8ea;
      border-radius: 10px;
      padding: 11px 24px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: #666;
      cursor: pointer;
    }
    .btn-publish {
      background: #0097B5;
      color: #fff;
      border: 1.5px solid #0097B5;
      border-radius: 10px;
      padding: 11px 28px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .btn-publish:hover { background: #007a93; }
    .btn-publish:disabled { background: #aaa; cursor: not-allowed; }
    .success-msg {
      background: #e8f8f2;
      color: #1a7a4a;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg.show { display: block; }
    .error-msg {
      background: #fff0f0;
      color: #c0392b;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .topbar { padding: 10px 20px; }
      .topbar-user { max-width: 120px; }
      .main { padding: 20px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .stat-card { padding: 14px 12px; }
      .stat-card .label { font-size: 0.68rem; }
      .stat-card .num { font-size: 1.4rem; }
      .page-header h1 { font-size: 1.2rem; }
      .btn-new { width: 100%; }
      .modal { padding: 24px 20px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
      .modal-actions { flex-direction: column-reverse; }
      .modal-actions button { width: 100%; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .cat-row .cat-name { width: 80px; font-size: 0.78rem; }
    }

    @media (max-width: 480px) {
      .topbar-left span { display: none; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo-trim.png" alt="Novasmile" onerror="this.style.display='none'" />
      <span>/ Admin</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="userEmail"></span>
      <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="page-header">
      <div>
        <h1>Blog Posts</h1>
        <p>Manage all published articles</p>
      </div>
      <button class="btn-new" onclick="openModal()">+ New Post</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Total Posts</div>
        <div class="num" id="totalPosts">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Published</div>
        <div class="num" id="publishedPosts">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Views</div>
        <div class="num" id="totalViews">0</div>
      </div>
    </div>

    <div class="cat-breakdown">
      <h3>Posts by Category</h3>
      <div id="catBreakdown"><p class="cat-breakdown-empty">No posts yet.</p></div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search posts by title..." oninput="renderPosts()" />
    </div>

    <div class="posts-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th class="th-sortable" onclick="toggleSort('views')" id="viewsHeader">Views ⇅</th>
            <th class="th-sortable" onclick="toggleSort('date')" id="dateHeader">Date ⇅</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="postsBody">
          <tr>
            <td colspan="5">
              <div class="empty-state">
                <p>No posts yet. Click <strong>New Post</strong> to get started.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- NEW/EDIT POST MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">New Post</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="success-msg" id="successMsg"></div>
      <div class="error-msg" id="errorMsg"></div>
      <div class="form-field">
        <label>Post Title *</label>
        <input type="text" id="postTitle" placeholder="e.g. 5 daily habits for healthier teeth" />
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Category *</label>
          <select id="postCategory">
            <option value="">Select category</option>
            <option value="Oral Care">Oral Care</option>
            <option value="Cosmetic">Cosmetic</option>
            <option value="Kids">Kids</option>
            <option value="Orthodontics">Orthodontics</option>
            <option value="Clinic News">Clinic News</option>
          </select>
      </div>
    </div>
      <div class="form-field">
        <label>Read Time</label>
        <input type="text" id="postReadTime" placeholder="e.g. 5 min read" />
      </div>
      <div class="form-field">
        <label>Cover Image URL *</label>
        <input type="text" id="postImage" placeholder="https://..." />
      </div>
      <div class="form-field">
        <label>Short Excerpt *</label>
        <input type="text" id="postExcerpt" placeholder="A short description of the article (1-2 sentences)" />
    </div>
    <div class="form-field">
        <label>Post Body *</label>
        <div id="postBodyEditor" style="background:#fff;border-radius:8px;min-height:280px;max-width:100%;overflow:hidden"></div>
        <input type="hidden" id="postBody" />
    </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn" onclick="closeModal()">Cancel</button>
        <button class="btn-publish" id="publishBtn" onclick="handlePublish()">Publish Post</button>
      </div>
  </div>

  <script type="module">
  const quill = new Quill('#postBodyEditor', {
  theme: 'snow',
  placeholder: 'Write your article here...',
  modules: {
    toolbar: [
      [{ header: [2, 3, false] }],
      ['bold', 'italic', 'underline'],
      [{ list: 'ordered' }, { list: 'bullet' }],
      ['blockquote'],
      ['clean']
    ]
  }
});
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, getDoc, updateDoc, serverTimestamp, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyAEa9BtvYs2RjSvRrZZLb2Pz3P-9Xfo5jI",
  authDomain: "nova-smile-404b5.firebaseapp.com",
  projectId: "nova-smile-404b5",
  storageBucket: "nova-smile-404b5.firebasestorage.app",
  messagingSenderId: "205119413201",
  appId: "1:205119413201:web:3e7027c9bf16978206def0"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let editingId = null;
    let allPosts = [];
    let sortField = 'date';
    let sortDir = 'desc';

    // Auth guard
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'admin-login.html';
      } else {
        document.getElementById('userEmail').textContent = user.email;
        loadPosts();
      }
    });

    // Logout
    window.handleLogout = async function() {
      await signOut(auth);
      window.location.href = 'admin-login.html';
    }

    // Load posts from Firestore
    async function loadPosts() {
      const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
      const snapshot = await getDocs(q);
      allPosts = [];
      snapshot.forEach(d => {
        const data = d.data();
        allPosts.push({
          id: d.id,
          ...data,
          status: data.status || 'published', // posts created before this update default to published
          views: typeof data.views === 'number' ? data.views : 0
        });
      });
      renderStats();
      renderCategoryBreakdown();
      renderPosts();
    }

    function renderStats() {
      document.getElementById('totalPosts').textContent = allPosts.length;
      document.getElementById('publishedPosts').textContent = allPosts.filter(p => p.status === 'published').length;
      const totalViews = allPosts.reduce((sum, p) => sum + (p.views || 0), 0);
      document.getElementById('totalViews').textContent = totalViews.toLocaleString();
    }

    function renderCategoryBreakdown() {
      const wrap = document.getElementById('catBreakdown');
      if (allPosts.length === 0) {
        wrap.innerHTML = '<p class="cat-breakdown-empty">No posts yet.</p>';
        return;
      }
      const counts = {};
      allPosts.forEach(p => {
        const cat = p.category || 'Uncategorised';
        counts[cat] = (counts[cat] || 0) + 1;
      });
      const max = Math.max(...Object.values(counts));
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      wrap.innerHTML = sorted.map(([cat, count]) => `
        <div class="cat-row">
          <div class="cat-name">${cat}</div>
          <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(count / max) * 100}%"></div></div>
          <div class="cat-count">${count}</div>
        </div>
      `).join('');
    }

    // Filter, sort, and render the table (does not re-fetch from Firestore)
    window.renderPosts = function() {
      const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();

      let posts = allPosts.filter(p => {
        return !searchTerm || (p.title || '').toLowerCase().includes(searchTerm);
      });

      posts.sort((a, b) => {
        let valA, valB;
        if (sortField === 'views') {
          valA = a.views || 0;
          valB = b.views || 0;
        } else {
          valA = a.createdAt ? a.createdAt.toDate().getTime() : 0;
          valB = b.createdAt ? b.createdAt.toDate().getTime() : 0;
        }
        return sortDir === 'asc' ? valA - valB : valB - valA;
      });

      const tbody = document.getElementById('postsBody');
      if (posts.length === 0) {
        const msg = allPosts.length === 0
          ? 'No posts yet. Click <strong>New Post</strong> to get started.'
          : 'No posts match your search.';
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>${msg}</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = posts.map(p => {
        const date = p.createdAt ? p.createdAt.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A';
        return `
          <tr>
            <td><div class="post-title">${p.title}</div></td>
            <td><span class="post-cat">${p.category || 'Uncategorised'}</span></td>
            <td class="post-views">${(p.views || 0).toLocaleString()}</td>
            <td class="post-date">${date}</td>
            <td>
              <button class="btn-edit" onclick="openEditModal('${p.id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})">Edit</button>
              <button class="btn-delete" onclick="deletePost('${p.id}')">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    window.toggleSort = function(field) {
      if (sortField === field) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDir = 'desc';
      }
      document.getElementById('viewsHeader').textContent = field === 'views' ? `Views ${sortDir === 'asc' ? '↑' : '↓'}` : 'Views ⇅';
      document.getElementById('dateHeader').textContent = field === 'date' ? `Date ${sortDir === 'asc' ? '↑' : '↓'}` : 'Date ⇅';
      renderPosts();
    }

    // Open modal
    window.openModal = function() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'New Post';
      document.getElementById('postTitle').value = '';
      document.getElementById('postCategory').value = '';
      document.getElementById('postReadTime').value = '';
      document.getElementById('postImage').value = '';
      document.getElementById('postExcerpt').value = '';
      quill.root.innerHTML = '';
      document.getElementById('publishBtn').textContent = 'Publish Post';
      document.getElementById('successMsg').classList.remove('show');
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('modalOverlay').classList.add('open');
    }

    window.openEditModal = function(id, data) {
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Post';
      document.getElementById('postTitle').value = data.title || '';
      document.getElementById('postCategory').value = data.category || '';
      document.getElementById('postReadTime').value = data.readTime || '';
      document.getElementById('postImage').value = data.image || '';
      document.getElementById('postExcerpt').value = data.excerpt || '';
      quill.root.innerHTML = data.body || '';
      document.getElementById('publishBtn').textContent = 'Save Changes';
      document.getElementById('successMsg').classList.remove('show');
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('modalOverlay').classList.add('open');
    }

    window.closeModal = function() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    // Save post as either 'draft' or 'published' — status comes from which
    // Publish / update post — every post created here is always published;
    // there's no draft state to accidentally leave a post in.
    window.handlePublish = async function() {
      const title = document.getElementById('postTitle').value.trim();
      const category = document.getElementById('postCategory').value;
      const readTime = document.getElementById('postReadTime').value.trim();
      const image = document.getElementById('postImage').value.trim();
      const body = quill.root.innerHTML.trim();
      const excerpt = document.getElementById('postExcerpt').value.trim();
      const publishBtn = document.getElementById('publishBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      if (!title || !category || !body || !excerpt) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.classList.add('show');
        return;
      }

      const publishLabel = editingId ? 'Save Changes' : 'Publish Post';

      publishBtn.disabled = true;
      cancelBtn.disabled = true;
      publishBtn.textContent = 'Saving...';
      errorMsg.classList.remove('show');

      try {
        const postData = { title, category, readTime, status: 'published', image, body, excerpt };

        if (editingId) {
          await updateDoc(doc(db, 'posts', editingId), postData);
          successMsg.textContent = 'Post updated successfully.';
        } else {
          await addDoc(collection(db, 'posts'), { ...postData, views: 0, createdAt: serverTimestamp() });
          successMsg.textContent = 'Post published successfully.';
        }

        successMsg.classList.add('show');
        loadPosts();
        setTimeout(closeModal, 1500);
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.classList.add('show');
        publishBtn.disabled = false;
        cancelBtn.disabled = false;
        publishBtn.textContent = publishLabel;
      }
    }

    // Delete post
    window.deletePost = async function(id) {
      if (!confirm('Are you sure you want to delete this post? This cannot be undone.')) return;
      await deleteDoc(doc(db, 'posts', id));
      loadPosts();
    }
  </script>
</body>
</html>
